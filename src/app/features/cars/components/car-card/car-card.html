<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-6 p-6">
    @for (car of cars; track car.make) {
    <div
        class="bg-white rounded-2xl shadow-lg overflow-hidden hover:scale-105 hover:shadow-2xl transition duration-300">

        <img src="https://placehold.co/600x350?text=Car" alt="Car" class="w-full h-48 object-cover">

        <div class="p-5">
            <h2 class="text-xl font-bold text-gray-800">
                {{ car.make }}
            </h2>

            <p class="text-gray-500 mt-1">
                {{ car.model }}
            </p>

            <div class="mt-4 flex items-center justify-between">
                <span class="text-2xl font-bold text-green-600">
                    £{{ car.price }}
                </span>

                <button class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700">
                    Buy
                </button>
            </div>
        </div>

    </div>
    }
</div>
